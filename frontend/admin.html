<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — АвтоГрад</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Навигация -->
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">Авто<span>Град</span></a>
        <button class="nav-toggle" onclick="toggleNav()">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li><a href="admin.html" class="active">Панель управления</a></li>
        </ul>
    </div>
</nav>

<!-- Админ-панель -->
<section class="admin-page">
    <div class="container">
        <div class="admin-header">
            <h1>Панель управления</h1>
        </div>

        <!-- Табы -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('cars')">Автомобили</button>
            <button class="tab-btn" onclick="switchTab('clients')">Клиенты</button>
            <button class="tab-btn" onclick="switchTab('sales')">Продажи</button>
        </div>

        <!-- ═══ Вкладка: Автомобили ═══ -->
        <div class="tab-content active" id="tab-cars">
            <div style="margin-bottom:24px">
                <button class="btn btn-primary" onclick="openCarForm()">+ Добавить автомобиль</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table" id="cars-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Марка</th>
                            <th>Модель</th>
                            <th>Год</th>
                            <th>Цена</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="cars-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- ═══ Вкладка: Клиенты ═══ -->
        <div class="tab-content" id="tab-clients">
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Фамилия</th>
                            <th>Телефон</th>
                            <th>Email</th>
                            <th>Паспорт</th>
                        </tr>
                    </thead>
                    <tbody id="clients-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- ═══ Вкладка: Продажи ═══ -->
        <div class="tab-content" id="tab-sales">
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Автомобиль</th>
                            <th>Клиент</th>
                            <th>Дата</th>
                            <th>Сумма</th>
                        </tr>
                    </thead>
                    <tbody id="sales-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</section>

<!-- Модалка: добавить / редактировать авто -->
<div class="modal-overlay" id="modal-car">
    <div class="modal" style="position:relative;max-width:600px">
        <button class="modal-close" onclick="closeCarForm()">&times;</button>
        <h2 id="car-form-title">Добавить автомобиль</h2>
        <p class="modal-subtitle">Заполните характеристики автомобиля</p>

        <form id="car-form">
            <input type="hidden" id="car-form-id">
            <div class="form-row">
                <div class="form-group">
                    <label>Марка *</label>
                    <input type="text" class="form-input" id="cf-brand" required>
                </div>
                <div class="form-group">
                    <label>Модель *</label>
                    <input type="text" class="form-input" id="cf-model" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Год *</label>
                    <input type="number" class="form-input" id="cf-year" required min="1900" max="2030">
                </div>
                <div class="form-group">
                    <label>Цена (₽) *</label>
                    <input type="number" class="form-input" id="cf-price" required min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Пробег (км)</label>
                    <input type="number" class="form-input" id="cf-mileage" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Объём двигателя (л)</label>
                    <input type="number" class="form-input" id="cf-engine" value="2.0" step="0.1" min="0.1">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Топливо</label>
                    <select class="form-input" id="cf-fuel">
                        <option>Бензин</option>
                        <option>Дизель</option>
                        <option>Гибрид</option>
                        <option>Электро</option>
                        <option>Газ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>КПП</label>
                    <select class="form-input" id="cf-transmission">
                        <option>Автомат</option>
                        <option>Механика</option>
                        <option>Робот</option>
                        <option>Вариатор</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Кузов</label>
                    <select class="form-input" id="cf-body">
                        <option>Седан</option>
                        <option>Кроссовер</option>
                        <option>Внедорожник</option>
                        <option>Хэтчбек</option>
                        <option>Универсал</option>
                        <option>Купе</option>
                        <option>Минивэн</option>
                        <option>Пикап</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Цвет</label>
                    <input type="text" class="form-input" id="cf-color" value="Белый">
                </div>
            </div>
            <div class="form-group">
                <label>URL изображения</label>
                <input type="url" class="form-input" id="cf-image" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea class="form-input" id="cf-description" rows="3"
                          style="resize:vertical"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
                Сохранить
            </button>
        </form>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-bottom">
            &copy; 2024—2026 АвтоГрад. Все права защищены.
        </div>
    </div>
</footer>

<div class="toast-container" id="toast-container"></div>

<script src="js/main.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
