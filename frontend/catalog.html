<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — АвтоГрад</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Навигация -->
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">Авто<span>Град</span></a>
        <button class="nav-toggle" onclick="toggleNav()">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html" class="active">Каталог</a></li>
            <li><a href="admin.html">Панель управления</a></li>
        </ul>
    </div>
</nav>

<!-- Каталог -->
<section class="section" style="padding-top:120px">
    <div class="container">
        <div class="section-title" style="margin-bottom:32px">
            <h2>Каталог автомобилей</h2>
            <p>Выберите автомобиль вашей мечты из нашего ассортимента</p>
        </div>

        <!-- Фильтры -->
        <div class="filters-bar">
            <div class="filters-row">
                <div class="search-wrapper">
                    <label>Поиск</label>
                    <input type="text" class="filter-input" id="filter-search"
                           placeholder="Марка или модель...">
                </div>
                <div class="filter-group">
                    <label>Марка</label>
                    <select class="filter-select" id="filter-brand">
                        <option value="">Все марки</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Цена от</label>
                    <input type="number" class="filter-input" id="filter-min-price"
                           placeholder="0" min="0">
                </div>
                <div class="filter-group">
                    <label>Цена до</label>
                    <input type="number" class="filter-input" id="filter-max-price"
                           placeholder="∞" min="0">
                </div>
                <div class="filter-group">
                    <label>Год</label>
                    <input type="number" class="filter-input" id="filter-year"
                           placeholder="Любой" min="1990" max="2030">
                </div>
                <div class="filter-group">
                    <label>Сортировка</label>
                    <select class="filter-select" id="filter-sort">
                        <option value="price_asc">Сначала дешёвые</option>
                        <option value="price_desc">Сначала дорогие</option>
                        <option value="year_desc">Сначала новые</option>
                        <option value="year_asc">Сначала старые</option>
                        <option value="brand_asc">По марке (А-Я)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div class="loader" id="catalog-loader">
            <div class="loader-spinner"></div>
        </div>

        <!-- Сетка автомобилей -->
        <div class="cars-grid" id="cars-grid"></div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state" style="display:none">
            <div class="empty-state-icon">🔍</div>
            <h3>Ничего не найдено</h3>
            <p>Попробуйте изменить параметры поиска</p>
        </div>

        <!-- Пагинация -->
        <div class="pagination" id="pagination"></div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-bottom">
            &copy; 2024—2026 АвтоГрад. Все права защищены.
        </div>
    </div>
</footer>

<div class="toast-container" id="toast-container"></div>

<script src="js/main.js"></script>
<script src="js/catalog.js"></script>
</body>
</html>
