<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомобиль — АвтоГрад</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Навигация -->
<nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo">Авто<span>Град</span></a>
        <button class="nav-toggle" onclick="toggleNav()">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li><a href="admin.html">Панель управления</a></li>
        </ul>
    </div>
</nav>

<!-- Loader -->
<div class="loader" id="car-loader" style="padding-top:200px">
    <div class="loader-spinner"></div>
</div>

<!-- Детальная информация -->
<section class="car-detail container" id="car-detail" style="display:none">
    <a href="catalog.html" class="btn btn-outline btn-sm" style="margin-bottom:32px">
        ← Назад в каталог
    </a>
    <div class="car-detail-grid">
        <div>
            <img class="car-detail-image" id="car-image" alt="">
        </div>
        <div class="car-detail-info">
            <h1 id="car-title"></h1>
            <div class="car-detail-year" id="car-year"></div>
            <div class="car-detail-price" id="car-price"></div>

            <div class="car-specs-grid" id="car-specs"></div>

            <p class="car-description" id="car-description"></p>

            <button class="btn btn-primary" id="btn-buy" style="width:100%">
                Оформить покупку
            </button>
        </div>
    </div>
</section>

<!-- Модальное окно покупки -->
<div class="modal-overlay" id="modal-buy">
    <div class="modal" style="position:relative">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <h2>Оформление покупки</h2>
        <p class="modal-subtitle" id="modal-car-name"></p>

        <form id="buy-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Имя *</label>
                    <input type="text" class="form-input" id="buy-first-name" required>
                </div>
                <div class="form-group">
                    <label>Фамилия *</label>
                    <input type="text" class="form-input" id="buy-last-name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" class="form-input" id="buy-phone" required
                       placeholder="+7 (999) 123-45-67">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" id="buy-email"
                       placeholder="example@mail.ru">
            </div>
            <div class="form-group">
                <label>Серия и номер паспорта</label>
                <input type="text" class="form-input" id="buy-passport"
                       placeholder="1234 567890">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">
                Подтвердить покупку
            </button>
        </form>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <div class="footer-bottom">
            &copy; 2024—2026 АвтоГрад. Все права защищены.
        </div>
    </div>
</footer>

<div class="toast-container" id="toast-container"></div>

<script src="js/main.js"></script>
<script src="js/car.js"></script>
</body>
</html>
